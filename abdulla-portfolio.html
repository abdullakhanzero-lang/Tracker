<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulla Shahir Khan | Data Analyst & Web Developer</title>
<meta name="description" content="Data-driven websites and smart Excel solutions for growing businesses. Based in Amravati, Maharashtra.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c12;
    --bg2: #0d1320;
    --surface: #111827;
    --surface2: #1a2333;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #f1f5f9;
    --muted: #8b9ab3;
    --card: rgba(17,24,39,0.8);
    --glow: 0 0 40px rgba(0,229,255,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* ─── HEADER ─── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1rem 5%;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(20px);
    background: rgba(8,12,18,0.85);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.25rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  nav { display: flex; gap: 2rem; align-items: center; }
  nav a {
    font-size: 0.85rem; font-weight: 500;
    color: var(--muted); text-decoration: none;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--accent); }
  .nav-cta {
    background: var(--accent); color: #000 !important;
    padding: 0.5rem 1.25rem; border-radius: 6px;
    font-weight: 700 !important; font-size: 0.8rem !important;
    transition: opacity 0.2s !important;
  }
  .nav-cta:hover { opacity: 0.85; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
  .mobile-nav {
    display: none; position: fixed; top: 65px; left: 0; right: 0; z-index: 99;
    background: rgba(8,12,18,0.98); backdrop-filter: blur(20px);
    padding: 1.5rem 5%; border-bottom: 1px solid var(--border);
    flex-direction: column; gap: 1rem;
  }
  .mobile-nav a {
    font-size: 1rem; color: var(--muted); text-decoration: none;
    font-weight: 500; padding: 0.5rem 0; border-bottom: 1px solid var(--border);
    transition: color 0.2s;
  }
  .mobile-nav a:hover { color: var(--accent); }
  @media (max-width: 768px) {
    nav { display: none; }
    .hamburger { display: flex; }
    .mobile-nav.open { display: flex; }
  }

  /* ─── HERO ─── */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    padding: 8rem 5% 5rem;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,229,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(124,58,237,0.1) 0%, transparent 60%),
                linear-gradient(180deg, #080c12 0%, #0a1220 100%);
  }
  .hero-grid-lines {
    position: absolute; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  }

  /* Floating orbs */
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(60px); pointer-events: none; z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,229,255,0.06); top: 10%; left: -10%; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: rgba(124,58,237,0.08); top: 30%; right: -5%; animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; background: rgba(245,158,11,0.06); bottom: 20%; left: 40%; animation-delay: 5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .hero-inner {
    position: relative; z-index: 1;
    max-width: 1200px; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4rem; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25);
    padding: 0.35rem 1rem; border-radius: 100px;
    font-size: 0.78rem; font-weight: 500; color: var(--accent);
    letter-spacing: 0.05em; margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease both;
  }
  .hero-badge::before { content: '●'; font-size: 0.5rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 800; line-height: 1.1;
    letter-spacing: -0.03em;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  h1 .accent { color: var(--accent); }
  h1 .accent2 { color: var(--accent2); background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub {
    font-size: 1.05rem; color: var(--muted); margin: 1.25rem 0 2rem;
    font-weight: 300; line-height: 1.7; max-width: 480px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .hero-btns {
    display: flex; gap: 1rem; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #000;
    padding: 0.85rem 2rem; border-radius: 8px;
    font-weight: 700; font-size: 0.95rem; text-decoration: none;
    transition: all 0.3s; box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,229,255,0.5); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 0.5rem;
    border: 1px solid var(--border); color: var(--text);
    padding: 0.85rem 2rem; border-radius: 8px;
    font-weight: 500; font-size: 0.95rem; text-decoration: none;
    transition: all 0.3s; backdrop-filter: blur(10px);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .hero-trust {
    display: flex; gap: 1.5rem; margin-top: 2.5rem; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .trust-item {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.82rem; color: var(--muted);
  }
  .trust-item::before { content: '✓'; color: var(--accent); font-weight: 700; }

  /* Dashboard mockup */
  .hero-visual {
    position: relative; animation: fadeUp 0.8s 0.3s ease both;
  }
  .mockup-window {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), var(--glow);
    transform: perspective(1000px) rotateY(-8deg) rotateX(3deg);
    transition: transform 0.5s;
  }
  .mockup-window:hover { transform: perspective(1000px) rotateY(0deg) rotateX(0deg); }
  .mockup-bar {
    background: var(--surface2); padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ef4444; } .dot-y { background: #f59e0b; } .dot-g { background: #22c55e; }
  .mockup-title { font-size: 0.72rem; color: var(--muted); margin-left: 0.5rem; font-family: monospace; }
  .mockup-body { padding: 1.25rem; }
  .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
  .dash-stat {
    background: var(--bg2); border-radius: 10px; padding: 0.75rem;
    border: 1px solid var(--border);
  }
  .dash-stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .dash-stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; margin-top: 0.2rem; }
  .val-c { color: var(--accent); }
  .val-p { color: #22c55e; }
  .val-o { color: var(--accent3); }
  .dash-chart { background: var(--bg2); border-radius: 10px; padding: 0.75rem; border: 1px solid var(--border); margin-bottom: 0.75rem; }
  .chart-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.5rem; }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; }
  .bar { border-radius: 3px 3px 0 0; flex: 1; animation: growBar 1s ease both; }
  @keyframes growBar { from { transform: scaleY(0); transform-origin: bottom; } }
  .dash-table { background: var(--bg2); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .table-row { display: flex; padding: 0.5rem 0.75rem; font-size: 0.7rem; border-bottom: 1px solid var(--border); align-items: center; gap: 0.5rem; }
  .table-row:last-child { border-bottom: none; }
  .table-row .dot-sm { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .row-name { flex: 1; color: var(--muted); }
  .row-val { font-family: monospace; font-size: 0.7rem; color: var(--text); }
  .row-badge { padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.6rem; font-weight: 600; }
  .badge-g { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge-b { background: rgba(0,229,255,0.15); color: var(--accent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; gap: 3rem; }
    .hero-visual { display: none; }
  }

  /* ─── SECTIONS SHARED ─── */
  section { position: relative; z-index: 1; padding: 6rem 5%; }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.75rem; font-weight: 600; color: var(--accent);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .section-tag::before { content: ''; width: 20px; height: 2px; background: var(--accent); border-radius: 1px; }
  h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 800; letter-spacing: -0.03em; line-height: 1.15;
    margin-bottom: 1rem;
  }
  .section-lead { font-size: 1.05rem; color: var(--muted); max-width: 520px; font-weight: 300; }
  .divider { width: 100%; height: 1px; background: var(--border); }

  /* ─── ABOUT ─── */
  #about { background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%); }
  .about-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 5rem; align-items: center; margin-top: 3rem; }
  .about-avatar-wrap {
    position: relative; display: flex; justify-content: center;
  }
  .about-avatar-ring {
    width: 280px; height: 280px; border-radius: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    padding: 2px; position: relative;
  }
  .about-avatar-inner {
    width: 100%; height: 100%; border-radius: 22px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 5rem; font-weight: 800; color: var(--accent);
    overflow: hidden;
  }
  .about-floating-badge {
    position: absolute;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.6rem 1rem;
    backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-tl { top: -10px; left: -20px; color: var(--accent); }
  .badge-br { bottom: -10px; right: -20px; color: var(--accent3); }
  .about-text h2 { margin-bottom: 0.5rem; }
  .about-text p { color: var(--muted); font-size: 0.97rem; line-height: 1.8; margin-bottom: 1rem; }
  .about-highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
  .highlight-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
    backdrop-filter: blur(10px); transition: border-color 0.3s;
  }
  .highlight-card:hover { border-color: rgba(0,229,255,0.3); }
  .highlight-num { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .highlight-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  @media (max-width: 900px) {
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .about-avatar-wrap { display: none; }
  }

  /* ─── SERVICES ─── */
  #services { background: var(--bg); }
  .services-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .service-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem;
    backdrop-filter: blur(10px); position: relative; overflow: hidden;
    transition: all 0.3s; cursor: default;
  }
  .service-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 16px;
    background: linear-gradient(135deg, rgba(0,229,255,0.05), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .service-card:hover { transform: translateY(-6px); border-color: rgba(0,229,255,0.25); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .service-card:hover::before { opacity: 1; }
  .service-icon {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin-bottom: 1.25rem;
  }
  .icon-cyan { background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.2); }
  .icon-purple { background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.2); }
  .icon-amber { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.2); }
  .service-card h3 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; }
  .service-card ul { list-style: none; }
  .service-card ul li {
    font-size: 0.87rem; color: var(--muted);
    padding: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .service-card ul li:last-child { border-bottom: none; }
  .service-card ul li::before { content: '→'; color: var(--accent); font-size: 0.8rem; }
  .services-cta { text-align: center; margin-top: 3rem; }
  @media (max-width: 900px) { .services-grid { grid-template-columns: 1fr; } }
  @media (min-width: 601px) and (max-width: 900px) { .services-grid { grid-template-columns: 1fr 1fr; } }

  /* ─── WHY CHOOSE ME ─── */
  #why { background: var(--bg2); }
  .why-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.25rem; margin-top: 3rem; }
  .why-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem 1.25rem;
    text-align: center; transition: all 0.3s;
  }
  .why-card:hover { transform: translateY(-4px); border-color: rgba(0,229,255,0.2); }
  .why-icon { font-size: 1.8rem; margin-bottom: 0.75rem; display: block; }
  .why-card h4 { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.4rem; }
  .why-card p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  @media (max-width: 768px) { .why-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 420px) { .why-grid { grid-template-columns: 1fr; } }

  /* ─── PORTFOLIO ─── */
  #portfolio { background: var(--bg); }
  .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
  .port-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; transition: all 0.3s;
  }
  .port-card:hover { transform: translateY(-5px); border-color: rgba(0,229,255,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .port-thumb {
    height: 160px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
  }
  .thumb-1 { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
  .thumb-2 { background: linear-gradient(135deg, #1a0533, #2d1b69, #11998e); }
  .thumb-3 { background: linear-gradient(135deg, #0d1b2a, #1b4332, #2d6a4f); }
  .thumb-4 { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
  .thumb-5 { background: linear-gradient(135deg, #2d1515, #5c1a1a, #851010); }
  .thumb-6 { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
  .port-thumb-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,12,18,0.7), transparent);
  }
  .port-body { padding: 1.25rem; }
  .port-tag { font-size: 0.7rem; color: var(--accent); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .port-body h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
  .port-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
  .port-link {
    font-size: 0.8rem; color: var(--accent); font-weight: 600;
    text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
    transition: gap 0.2s;
  }
  .port-link:hover { gap: 0.6rem; }
  @media (max-width: 900px) { .portfolio-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .portfolio-grid { grid-template-columns: 1fr; } }

  /* ─── SKILLS ─── */
  #skills { background: var(--bg2); }
  .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-top: 3rem; }
  .skills-group h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); }
  .skill-item { margin-bottom: 1.25rem; }
  .skill-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
  .skill-name { font-size: 0.88rem; font-weight: 500; }
  .skill-pct { font-size: 0.8rem; color: var(--muted); font-family: monospace; }
  .skill-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .skill-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0; transition: width 1.2s ease; }
  .skill-fill.amber { background: linear-gradient(90deg, var(--accent3), #f97316); }
  @media (max-width: 700px) { .skills-grid { grid-template-columns: 1fr; gap: 2rem; } }

  /* ─── CONTACT ─── */
  #contact { background: var(--bg); }
  .contact-inner { display: grid; grid-template-columns: 1fr 1.4fr; gap: 4rem; margin-top: 3rem; align-items: start; }
  .contact-info h2 { font-size: clamp(1.6rem, 3vw, 2.2rem
